<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interwoven Family Care — Coming Soon</title>
  <meta name="description" content="Adaptive in-home family support in Tacoma, Washington. Interwoven Family Care supports the family as a whole — coming soon.">
  <link rel="canonical" href="https://interwoven.care/">
  <link rel="icon" type="image/png" href="assets/heart.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="theme-color" content="#F6F3EE">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://interwoven.care/">
  <meta property="og:title" content="Interwoven Family Care">
  <meta property="og:description" content="Adaptive in-home family support in Tacoma, Washington. Coming soon.">
  <meta property="og:image" content="https://interwoven.care/assets/og.png">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --teal:   #3FA7A3;
      --moss:   #7A962B;
      --copper: #D96A1D;
      --ochre:  #D9A21B;
      --plum:   #7A2E4F;
      --ivory:  #F6F3EE;
      --ink:    #2B2B2B;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background-color: var(--ivory);
      background-image:
        radial-gradient(55rem 38rem at 10% -10%, rgba(63, 167, 163, 0.07), transparent 60%),
        radial-gradient(48rem 34rem at 105% 108%, rgba(217, 162, 27, 0.08), transparent 60%);
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    ::selection { background: rgba(63, 167, 163, 0.28); }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(0.75rem, 2.5vh, 3rem) 1.5rem 0;
    }

    main {
      margin-block: auto;
      max-width: 42rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    main img { display: block; height: auto; }

    .crest { width: min(52vw, 20vh, 250px); }

    .wordmark {
      width: min(88vw, 58vh, 540px);
      margin-top: clamp(0.7rem, 2vh, 2rem);
    }

    .coming-soon {
      margin: clamp(1rem, 2.4vh, 2.25rem) 0 0;
      font-family: "Quicksand", "Trebuchet MS", sans-serif;
      font-weight: 700;
      font-size: clamp(1.05rem, 2.6vw, 1.4rem);
      letter-spacing: 0.34em;
      text-indent: 0.34em;
      text-transform: uppercase;
      color: var(--copper);
    }

    .lede {
      margin: clamp(1rem, 2.4vh, 2.25rem) 0 0;
      font-family: "Quicksand", "Trebuchet MS", sans-serif;
      font-weight: 600;
      font-size: clamp(1.2rem, 3vw, 1.45rem);
      line-height: 1.45;
      text-wrap: balance;
    }

    .sub {
      margin: 0.65rem 0 0;
      font-size: clamp(1rem, 2.4vw, 1.1rem);
      line-height: 1.55;
      color: var(--plum);
    }

    .thread {
      margin: clamp(0.9rem, 2vh, 1.4rem) 0 0;
      max-width: 32rem;
      font-style: italic;
      font-size: clamp(0.95rem, 2.3vw, 1.05rem);
      line-height: 1.6;
      color: rgba(43, 43, 43, 0.72);
      text-wrap: balance;
    }

    .cta {
      margin-top: clamp(1.1rem, 2.8vh, 2.5rem);
      display: inline-block;
      padding: 0.8em 1.6em;
      border-radius: 999px;
      background: var(--teal);
      color: var(--ink);
      font-family: "Quicksand", "Trebuchet MS", sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(43, 43, 43, 0.08);
      transition: background-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .cta:hover {
      background: #379793;
      transform: translateY(-1.5px);
      box-shadow: 0 5px 16px rgba(43, 43, 43, 0.12);
    }

    .cta:focus-visible {
      outline: 3px solid var(--plum);
      outline-offset: 3px;
    }

    footer {
      padding: clamp(0.9rem, 2.2vh, 2.5rem) 1rem 0.9rem;
      font-size: 0.82rem;
      color: rgba(43, 43, 43, 0.55);
      text-align: center;
    }

    .rise {
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.7s ease-out forwards;
    }

    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.15s; }
    .d3 { animation-delay: 0.25s; }
    .d4 { animation-delay: 0.35s; }
    .d5 { animation-delay: 0.45s; }
    .d6 { animation-delay: 0.55s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .rise { animation: none; opacity: 1; transform: none; }
      .cta, .cta:hover { transition: none; transform: none; }
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Interwoven Family Care",
    "url": "https://interwoven.care/",
    "email": "bri@interwoven.care",
    "description": "Adaptive in-home family support in Tacoma, Washington.",
    "areaServed": "Tacoma, Washington"
  }
  </script>
</head>
<body>
  <div class="page">
    <main>
      <img class="crest rise d1" src="assets/house.png" alt="" width="640" height="709">
      <h1 style="margin:0; line-height:0;">
        <img class="wordmark rise d2" src="assets/wordmark.png" alt="Interwoven Family Care" width="1120" height="530">
      </h1>
      <p class="coming-soon rise d3">Coming Soon</p>
      <p class="lede rise d4">Interwoven Family Care supports the family as&nbsp;a&nbsp;whole.</p>
      <p class="sub rise d4">Adaptive in-home family support in Tacoma, Washington.</p>
      <p class="thread rise d5">Childcare is one thread in the larger weave of family&nbsp;support.</p>
      <a class="cta rise d6" href="mailto:bri@interwoven.care">Reach out&nbsp;·&nbsp;bri@interwoven.care</a>
    </main>
    <footer class="rise d6">© 2026 Interwoven Family Care · Tacoma, WA</footer>
  </div>
</body>
</html>
